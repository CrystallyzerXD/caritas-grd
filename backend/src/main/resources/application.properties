# Server
server.port=8081
spring.application.name=caritas-grd

# Database
spring.datasource.url=jdbc:postgresql://localhost:5432/caritas_grd
spring.datasource.username=postgres
spring.datasource.password=prueba123
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# JWT
app.jwt.secret=5JzP8mKv2rXqN9sT4wYhUbGcFdAeLoMiRnQpZkWjVuCyOxElBtHgIsDA3f6a7e0
app.jwt.expiration=86400000

# File Upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=50MB
app.upload.dir=uploads

# Logging
logging.level.com.caritas.grd=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN

# Jackson
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=America/Lima
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss
